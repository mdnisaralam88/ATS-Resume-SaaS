server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api/v1
  compression:
    enabled: true

spring:
  application:
    name: resumeiq-backend

  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI}

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 15MB

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:noreply@resumeiq.com}
    password: ${MAIL_PASSWORD:changeme}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        connectiontimeout: 5000
        timeout: 5000
        writetimeout: 5000

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:thisIsAVeryLongAndSecureJwtSecretKeyForResumeIQApplicationThatShouldBeAtLeast256BitsLong}
  access-token-expiration: ${JWT_ACCESS_EXPIRATION:900000}       # 15 minutes
  refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:604800000}  # 7 days

# File Storage
file:
  upload-dir: ${FILE_UPLOAD_DIR:./uploads}
  report-dir: ${FILE_REPORT_DIR:./reports}
  max-size-bytes: 10485760  # 10MB

# App Config
app:
  name: ResumeIQ
  url: ${APP_URL:http://localhost:5173}
  backend-url: ${BACKEND_URL:http://localhost:8080}
  email-verification-expiry: 86400000  # 24 hours
  password-reset-expiry: 3600000       # 1 hour

# Subscription Limits
subscription:
  free:
    daily-scans: 2
  pro:
    daily-scans: -1  # unlimited
  premium:
    daily-scans: -1  # unlimited

# Springdoc / Swagger
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
  info:
    title: ResumeIQ API
    version: 1.0.0
    description: AI-Powered ATS Resume Analyzer Platform API

# Logging
logging:
  level:
    com.resumeiq: DEBUG
    org.springframework.security: WARN
    org.springframework.data.mongodb.core.MongoTemplate: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
