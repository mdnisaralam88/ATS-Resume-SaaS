version: '3.8'

services:
  # ── Backend ──────────────────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: resumeiq-backend
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - FILE_UPLOAD_DIR=/app/uploads
      - FILE_REPORT_DIR=/app/reports
    volumes:
      - uploads_data:/app/uploads
      - reports_data:/app/reports

  # ── Frontend ─────────────────────────────────────────────────────────
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: resumeiq-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  uploads_data:
  reports_data:
